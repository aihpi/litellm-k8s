apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  LITELLM_LOG: info
  UI_PATH: /ui
  config.yaml: |
    litellm_settings:
      success_callback: ["prometheus"]
      require_auth_for_metrics_endpoint: false

    model_list:
      - model_name: llama-3b
        litellm_params:
          model: openai/llama-3b
          api_base: http://llama-3b-service:8000/v1
          api_key: dummy
      - model_name: qwen-image-edit
        litellm_params:
          model: aihpi-provider/qwen-image-edit
          api_base: http://qwen-image-edit:8000/v1
          api_key: dummy
      - model_name: octen-embedding-8b
        litellm_params:
          model: openai/octen-embedding-8b
          api_base: http://octen-embedding-8b-service:8000/v1
          api_key: dummy
          encoding_format: float
        model_info:
          metadata:
            mode: embedding
      # Example: registering a LoRA adapter served by vLLM as a separate model entry.
      # The served-model-name must match what vLLM exposes (preloaded via
      # --lora-modules NAME=path, or runtime-loaded via /v1/load_lora_adapter).
      # - model_name: ministral-3-14b-my-adapter
      #   litellm_params:
      #     model: openai/ministral-3-14b-my-adapter
      #     api_base: http://ministral-3-14b-service:8000/v1
      #     api_key: dummy
