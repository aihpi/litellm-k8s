apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  labels:
    app: litellm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - vx01
                      - vx02
                      - vx03
                      - vx04
      containers:
        - name: litellm
          image: ghcr.io/aihpi/tool-litellm:aihpi-provider
          imagePullPolicy: Always
          command: ["litellm"]
          args: ["--config", "/etc/litellm/config.yaml", "--port", "4000", "--num_workers", "1"]
          ports:
            - containerPort: 4000
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: LITELLM_MASTER_KEY
            - name: LITELLM_CONFIG
              value: /etc/litellm/config.yaml
            - name: STORE_MODEL_IN_DB
              value: "True"
            - name: LITELLM_LOG
              valueFrom:
                configMapKeyRef:
                  name: litellm-config
                  key: LITELLM_LOG
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: POSTGRES_PASSWORD
            # DATABASE_URL is assembled from POSTGRES_PASSWORD via K8s $(VAR)
            # interpolation so only the password lives in the secret; host/db/user
            # are in plain manifest and point at the in-cluster postgres-service.
            - name: DATABASE_URL
              value: postgresql://litellm:$(POSTGRES_PASSWORD)@postgres-service:5432/litellm
            - name: LITELLM_DATABASE_URL
              value: postgresql://litellm:$(POSTGRES_PASSWORD)@postgres-service:5432/litellm
            - name: UI_PATH
              valueFrom:
                configMapKeyRef:
                  name: litellm-config
                  key: UI_PATH
            - name: UI_USERNAME
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: UI_USERNAME
            - name: UI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: UI_PASSWORD
            # Let LiteLLM apply DB schema changes on startup using versioned
            # Prisma migrations (`prisma migrate deploy`) rather than `db push`.
            - name: DISABLE_SCHEMA_UPDATE
              value: "false"
            - name: USE_PRISMA_MIGRATE
              value: "True"
          volumeMounts:
            - name: litellm-config
              mountPath: /etc/litellm/config.yaml
              subPath: config.yaml
      volumes:
        - name: litellm-config
          configMap:
            name: litellm-config
