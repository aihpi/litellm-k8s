apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }
    http {
      upstream litellm_backend {
        server litellm-service.litellm.svc.cluster.local:4000;
      }
      server {
        listen 4000;

        location = /metrics { return 403; }
        location ^~ /metrics/ { return 403; }

        if ($request_method = HEAD) {
            return 200;
        }

        location / {
          # Use $request_uri to ensure query strings and special paths
          # are passed exactly as they arrived.
          proxy_pass http://litellm_backend;

          proxy_http_version 1.1;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # Streaming and WebSocket support
          proxy_set_header Upgrade           $http_upgrade;
          proxy_set_header Connection        "upgrade";
          proxy_buffering                    off;
          proxy_read_timeout                 300s;

          # Prevent Nginx from appending or stripping slashes
          proxy_redirect off;
        }
      }
    }
