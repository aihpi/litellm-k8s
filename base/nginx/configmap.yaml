apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }
    http {
      # Only send "Connection: upgrade" when the client actually initiated a
      # WebSocket upgrade. For plain GETs, send "Connection: close". Required
      # when an HTTP/2 frontend (Caddy) sits in front of this nginx — HTTP/2
      # forbids hop-by-hop Connection: upgrade headers and will abort the
      # response with ERR_HTTP2_PROTOCOL_ERROR otherwise (symptom: JS chunks
      # fail to load, LiteLLM UI stuck on "Loading...").
      map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
      }

      upstream litellm_backend {
        server litellm-service.litellm.svc.cluster.local:4000;
      }
      server {
        listen 4100;

        # Emit relative Location headers on nginx-generated redirects (e.g. /ui -> /ui/
        # trailing-slash). Otherwise nginx builds an absolute URL using the listen port
        # 4100, which doesn't match what the LB/Caddy expose to clients and leaks the
        # wrong port back to the browser.
        #  absolute_redirect off;

        location = /metrics { return 403; }
        location ^~ /metrics/ { return 403; }

        # Short-circuit /ui -> /ui/ in nginx so LiteLLM never sees the no-slash form.
        # LiteLLM otherwise emits an absolute Location header built from the inbound
        # Host (the cluster IP/port pair), which is unreachable from the public LB.
        # With absolute_redirect off above, this 301 carries only the path.
        #  location = /ui { return 301 /ui/; }

        if ($request_method = HEAD) {
            return 200;
        }

        # LoRA adapter uploads are large (multi-GB tar.gz) and slow from
        # residential/SLURM uplinks (~440 KB/s observed). Need to disable request
        # buffering so nginx streams to LiteLLM instead of caching the whole body
        # to disk, raise client_max_body_size, and extend the upstream timeout.
        # Path is the LiteLLM pass-through route /v1/lora/upload which forwards
        # to the internal lora-manager service.
        location ~ ^/v1/lora/upload(/|$) {
          proxy_pass http://litellm_backend;

          proxy_http_version 1.1;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Authorization     $http_authorization;

          client_max_body_size      4G;
          proxy_request_buffering   off;
          proxy_buffering           off;
          proxy_read_timeout        600s;
          proxy_send_timeout        600s;
          proxy_redirect            off;
        }

        location / {
          # Use $request_uri to ensure query strings and special paths
          # are passed exactly as they arrived.
          proxy_pass http://litellm_backend;

          proxy_http_version 1.1;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # Streaming and WebSocket support
          proxy_set_header Upgrade           $http_upgrade;
          proxy_set_header Connection        $connection_upgrade;
          proxy_buffering                    off;
          proxy_read_timeout                 300s;

          # Prevent Nginx from appending or stripping slashes
          proxy_redirect off;
        }
      }
    }
