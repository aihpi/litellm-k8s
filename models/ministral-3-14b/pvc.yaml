apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ministral-3-14b-cache
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-k8s-general
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ministral-3-14b-adapters
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-k8s-general
  resources:
    requests:
      storage: 50Gi
