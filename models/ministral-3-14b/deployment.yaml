apiVersion: apps/v1
kind: Deployment
metadata:
  name: ministral-3-14b
  labels:
    app: ministral-3-14b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ministral-3-14b
  template:
    metadata:
      labels:
        app: ministral-3-14b
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        accelerator: a30
      containers:
        - name: vllm
          image: vllm/vllm-openai@sha256:04563c302537a91aa49ebdfbceda96111c5712275999b7e8804fa598f0b5641d
          args:
            - "--model"
            - "mistralai/Ministral-3-14B-Instruct-2512-BF16"
            - "--served-model-name"
            - "ministral-3-14b"
            - "--tensor-parallel-size"
            - "2"
            - "--tool-call-parser"
            - "mistral"
            - "--enable-auto-tool-choice"
            - "--dtype"
            - "bfloat16"
            - "--max-model-len"
            - "20480"
            - "--max-num-seqs"
            - "8"
            - "--gpu-memory-utilization"
            - "0.95"
            - "--enable-lora"
            - "--max-loras"
            - "2"
            - "--max-lora-rank"
            - "64"
            # Preload static adapters by uncommenting and listing name=path pairs.
            # Paths may be /adapters/<dir> (PVC) or HF repo IDs (e.g. user/my-lora).
            # - "--lora-modules"
            # - "my-adapter=/adapters/my-adapter"
            - "--port"
            - "8000"
          ports:
            - containerPort: 8000
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: HF_TOKEN
            - name: VLLM_ALLOW_RUNTIME_LORA_UPDATING
              value: "true"
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: adapters
              mountPath: /adapters
          resources:
            limits:
              nvidia.com/gpu: "2"
            requests:
              nvidia.com/gpu: "2"
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: ministral-3-14b-cache
        - name: adapters
          persistentVolumeClaim:
            claimName: ministral-3-14b-adapters
