apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemma-4-31b
  labels:
    app: gemma-4-31b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gemma-4-31b
  template:
    metadata:
      labels:
        app: gemma-4-31b
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        accelerator: a30
      containers:
        - name: vllm
          image: vllm/vllm-openai@sha256:04563c302537a91aa49ebdfbceda96111c5712275999b7e8804fa598f0b5641d
          # Wrapper auto-discovers LoRA adapters under /adapters/ at startup and
          # passes them to vLLM as --lora-modules name=path. Same shape as
          # ministral-3-14b. Image inputs are blocked at request time via
          # --limit-mm-per-prompt; the SigLIP vision tower still initializes on
          # startup (~1-3 GiB GPU tax) — vLLM has no clean knob to fully evict it.
          command: ["/bin/bash", "-c"]
          args:
            - |
              LORA_ARGS=""
              if [ -d /adapters ]; then
                for dir in /adapters/*/; do
                  if [ -d "$dir" ]; then
                    name=$(basename "$dir")
                    LORA_ARGS="${LORA_ARGS} ${name}=${dir}"
                  fi
                done
              fi

              LORA_MODULE_FLAG=""
              if [ -n "$LORA_ARGS" ]; then
                LORA_MODULE_FLAG="--lora-modules $LORA_ARGS"
                echo "Auto-discovered LoRA adapters: $LORA_ARGS"
              fi

              exec python3 -m vllm.entrypoints.openai.api_server \
                --model google/gemma-4-31B-it \
                --served-model-name gemma-4-31b \
                --tensor-parallel-size 4 \
                --dtype bfloat16 \
                --max-model-len 16384 \
                --max-num-seqs 8 \
                --gpu-memory-utilization 0.85 \
                --limit-mm-per-prompt '{"image": 0}' \
                --enable-auto-tool-choice \
                --reasoning-parser gemma4 \
                --tool-call-parser gemma4 \
                --chat-template examples/tool_chat_template_gemma4.jinja \
                --enable-lora \
                --max-loras 2 \
                --max-lora-rank 64 \
                $LORA_MODULE_FLAG \
                --port 8000
          ports:
            - containerPort: 8000
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: HF_TOKEN
            - name: VLLM_ALLOW_RUNTIME_LORA_UPDATING
              value: "true"
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: adapters
              mountPath: /adapters
          resources:
            limits:
              nvidia.com/gpu: "4"
            requests:
              nvidia.com/gpu: "4"
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: gemma-4-31b-cache
        - name: adapters
          persistentVolumeClaim:
            claimName: gemma-4-31b-adapters
