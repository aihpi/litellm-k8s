apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpt-oss-120b
  labels:
    app: gpt-oss-120b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpt-oss-120b
  template:
    metadata:
      labels:
        app: gpt-oss-120b
    spec:
      nodeSelector:
        accelerator: h100
      containers:
        - name: vllm
          image: vllm/vllm-openai@sha256:04563c302537a91aa49ebdfbceda96111c5712275999b7e8804fa598f0b5641d
          args:
            - "--model"
            - "openai/gpt-oss-120b"
            - "--served-model-name"
            - "gpt-oss-120b"
            - "--config"
            - "/etc/vllm/GPT-OSS_Hopper.yaml"
            - "--tensor-parallel-size"
            - "1"
            - "--tool-call-parser"
            - "openai"
            - "--enable-auto-tool-choice"
            - "--gpu-memory-utilization"
            - "0.90"
            # LoRA is disabled on gpt-oss-120b pending MoE+LoRA compatibility
            # verification on the pinned vLLM digest (Phase 0.3 of the LoRA plan).
            # Re-enable by uncommenting the four flags below, restoring the
            # adapters volume/mount and env var, and re-adding the
            # gpt-oss-120b-adapters PVC in pvc.yaml.
            # - "--enable-lora"
            # - "--max-loras"
            # - "4"
            # - "--max-lora-rank"
            # - "64"
            # - "--lora-modules"
            # - "my-adapter=/adapters/my-adapter"
            - "--port"
            - "8000"
          ports:
            - containerPort: 8000
          env:
            - name: PYTORCH_ALLOC_CONF
              value: "expandable_segments:True"
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: HF_TOKEN
            # Re-enable alongside the --enable-lora args above.
            # - name: VLLM_ALLOW_RUNTIME_LORA_UPDATING
            #   value: "true"
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: vllm-config
              mountPath: /etc/vllm
            # - name: adapters
            #   mountPath: /adapters
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: "256Gi"
              cpu: "64"
            requests:
              nvidia.com/gpu: "1"
              memory: "192Gi"
              cpu: "32"
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: gpt-oss-120b-cache
        - name: vllm-config
          configMap:
            name: gpt-oss-120b-config
        # - name: adapters
        #   persistentVolumeClaim:
        #     claimName: gpt-oss-120b-adapters
