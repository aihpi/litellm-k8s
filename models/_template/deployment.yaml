apiVersion: apps/v1
kind: Deployment
metadata:
  name: MODEL_NAME
  labels:
    app: MODEL_NAME
spec:
  replicas: 1
  selector:
    matchLabels:
      app: MODEL_NAME
  template:
    metadata:
      labels:
        app: MODEL_NAME
    spec:
      nodeSelector:
        nvidia.com/gpu.product: GPU_PRODUCT
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - "--model"
            - "MODEL_ID"
            - "--served-model-name"
            - "MODEL_NAME"
            - "--max-model-len"
            - "MAX_MODEL_LEN"
            # Optional: dynamic LoRA adapter loading.
            # Sizing: max-loras pre-allocates GPU memory per slot at max-lora-rank.
            # Use 4 on 80GB cards (H100), 2 on 24GB cards (A30) as a starting point.
            # - "--enable-lora"
            # - "--max-loras"
            # - "4"
            # - "--max-lora-rank"
            # - "64"
            # - "--lora-modules"
            # - "my-adapter=/adapters/my-adapter"
            #
            # Alternative: replace the static args list with a shell wrapper that
            # auto-discovers every subdirectory under /adapters and registers it
            # as --lora-modules <name>=<path>. See models/ministral-3-14b/deployment.yaml
            # for the live example. Use this when you'd otherwise be hand-maintaining
            # a long --lora-modules list, or want adapters dropped onto the PVC to
            # survive pod restarts without manual /v1/load_lora_adapter calls.
            # Shape:
            #   command: ["/bin/bash", "-c"]
            #   args:
            #     - |
            #       LORA_ARGS=""
            #       if [ -d /adapters ]; then
            #         for dir in /adapters/*/; do
            #           [ -d "$dir" ] && LORA_ARGS="${LORA_ARGS} $(basename "$dir")=${dir}"
            #         done
            #       fi
            #       LORA_MODULE_FLAG=""
            #       [ -n "$LORA_ARGS" ] && LORA_MODULE_FLAG="--lora-modules $LORA_ARGS"
            #       exec python3 -m vllm.entrypoints.openai.api_server \
            #         --model MODEL_ID --served-model-name MODEL_NAME \
            #         --enable-lora --max-loras 4 --max-lora-rank 64 \
            #         $LORA_MODULE_FLAG --port PORT
            # Trade-off: adapter directory names become the served lora_name verbatim,
            # and whitespace in names will break the wrapper (relies on word-splitting).
            - "--port"
            - "PORT"
          ports:
            - containerPort: PORT
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: HF_TOKEN
            # Optional: enable runtime /v1/load_lora_adapter and /v1/unload_lora_adapter.
            # - name: VLLM_ALLOW_RUNTIME_LORA_UPDATING
            #   value: "true"
          # Optional LoRA adapter PVC (pair with the args above and a MODEL_NAME-adapters PVC):
          # volumeMounts:
          #   - name: adapters
          #     mountPath: /adapters
          resources:
            limits:
              nvidia.com/gpu: "GPU_COUNT"
      # volumes:
      #   - name: adapters
      #     persistentVolumeClaim:
      #       claimName: MODEL_NAME-adapters
