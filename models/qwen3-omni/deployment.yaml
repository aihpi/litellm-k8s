apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-omni
  labels:
    app: qwen3-omni
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen3-omni
  template:
    metadata:
      labels:
        app: qwen3-omni
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        accelerator: h100
      containers:
        - name: vllm
          image: vllm/vllm-omni:v0.18.0
          args:
            - "--model"
            - "marksverdhei/Qwen3-Omni-30B-A3B-FP8"
            - "--served-model-name"
            - "qwen3-omni"
            - "--dtype"
            - "bfloat16"
            - "--tensor-parallel-size"
            - "1"
            - "--gpu-memory-utilization"
            - "0.90"
            - "--max-model-len"
            - "65536"
            - "--max-num-seqs"
            - "8"
            - "--limit-mm-per-prompt"
            - "image=0,video=0,audio=5"
            - "--port"
            - "8000"
          ports:
            - containerPort: 8000
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: HF_TOKEN
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: "256Gi"
              cpu: "64"
            requests:
              nvidia.com/gpu: "1"
              memory: "192Gi"
              cpu: "32"
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: qwen3-omni-cache
