apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    spec:
      containers:
        - name: litellm
          imagePullPolicy: Always
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          env:
            - name: LITELLM_ASSET_PREFIX
              value: /litellm-asset-prefix
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "3Gi"
