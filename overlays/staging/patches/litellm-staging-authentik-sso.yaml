apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
spec:
  template:
    spec:
      containers:
        - name: litellm
          env:
            - name: AUTHENTIK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: AUTHENTIK_CLIENT_ID
            - name: AUTHENTIK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: AUTHENTIK_CLIENT_SECRET
            - name: AUTHENTIK_ISSUER
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: AUTHENTIK_ISSUER
            - name: AUTHENTIK_ADMIN_GROUP
              value: SCI-ADMINS
            - name: AUTHENTIK_GROUPS_ATTRIBUTE
              value: groups
            - name: PROXY_BASE_URL
              value: http://10.127.129.5
